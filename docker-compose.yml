# Local development only. Production (Dokploy) builds the `runtime` stage of
# the Dockerfile directly and points DATABASE_URL at a Dokploy-managed
# Postgres service — this compose file's `db` service has no prod equivalent.
services:
  app:
    build:
      context: .
      target: development
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/xarvis_brain?schema=public
      PORT: 3000
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    volumes:
      # :Z relabels the bind mount for exclusive container access under
      # SELinux (enforcing on Fedora/RHEL hosts); harmless no-op elsewhere.
      - .:/app:Z
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: xarvis_brain
    ports:
      - '5432:5432'
    volumes:
      - xarvis-brain-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  xarvis-brain-db-data:
